environment: development
log_level: INFO
log_file: data/logs/tyr.log
db_path: data/db/tyr.db
market_cache_dir: data/market_cache

thresholds:
  min_net_profit_pct: 0.005   # 0.5% minimum net profit to act
  max_position_usdc: 100.0
  max_daily_loss_usdc: 500.0
  max_open_positions: 5
  opportunity_ttl_secs: 2.0
  dry_run: true               # ALWAYS true in default.yaml

fees:
  polymarket_taker_bps: 200   # 2%
  polymarket_maker_bps: 0
  kalshi_taker_fee_pct: 0.07  # ~7% of profit
  slippage_buffer_pct: 0.005  # 0.5% reserve

enable_spread_scanner: true
enable_cross_market_scanner: true
enable_cross_platform_scanner: true

fuzzy_match_threshold: 85.0
max_market_age_days: 90

# Kalshi REST poll interval (seconds) — no WebSocket available
kalshi_poll_interval: 5.0

# Polymarket REST: market bootstrap page size
polymarket_page_size: 500
